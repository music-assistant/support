name: Lock Closed Threads

on:
  schedule:
    # Run weekly on Sundays at 4:00 AM UTC
    - cron: '0 4 * * 0'
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@v6
        with:
          github-token: ${{ github.token }}
          issue-inactive-days: 30
          issue-lock-reason: 'resolved'
          issue-comment: >
            This issue has been automatically locked since there has been no
            activity for 30 days after it was closed. If you are still
            experiencing a problem, please open a new issue with updated
            information and reference this one.
          # Do not lock PRs (this is a support repo)
          pr-inactive-days: -1
