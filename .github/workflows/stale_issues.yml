name: Stale Issue Management

on:
  schedule:
    # Run daily at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch: {}

permissions:
  issues: write

jobs:
  close-waiting-for-user:
    name: Close unresponsive issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          # Only target issues labeled waiting-for-user
          only-labels: 'waiting-for-user'

          # Do not process PRs
          days-before-pr-stale: -1
          days-before-pr-close: -1

          # After 14 days with no response, mark stale
          days-before-issue-stale: 14
          stale-issue-label: 'stale'
          stale-issue-message: >
            This issue has been labeled `waiting-for-user` for 14 days with no response.
            It will be automatically closed in 3 days if no further activity occurs.
            If you are still experiencing this issue, please provide the requested
            information or comment to keep it open.

          # Close 3 days after being marked stale
          days-before-issue-close: 3
          close-issue-label: 'auto-closed'
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            If you are still experiencing the problem, please open a new issue
            with updated information and logs.

          # Don't touch issues with these labels
          exempt-issue-labels: 'bug-confirmed,enhancement,pinned'

          # Remove stale label if there is new activity
          remove-stale-when-updated: true

  stale-inactive-issues:
    name: Handle dormant issues
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          # Do not process PRs
          days-before-pr-stale: -1
          days-before-pr-close: -1

          # After 60 days of zero activity, mark stale
          days-before-issue-stale: 60
          stale-issue-label: 'stale'
          stale-issue-message: >
            This issue has had no activity for 60 days. It will be
            automatically closed in 14 days if there is no further activity.
            If this is still relevant, please comment with an update.

          # Close 14 days after stale
          days-before-issue-close: 14
          close-issue-label: 'auto-closed'
          close-issue-message: >
            This issue has been automatically closed due to prolonged inactivity.
            If you are still experiencing the problem, please open a new issue
            with updated information and logs.

          # Issues already being tracked should not be double-processed
          exempt-issue-labels: 'waiting-for-user,bug-confirmed,enhancement,pinned,needs-attention'

          remove-stale-when-updated: true
