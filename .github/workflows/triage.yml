# Music Assistant issue triage (experimental).
#
# Analyses newly opened/edited issues: validates an attached diagnostics file,
# posts a single sticky summary comment, applies setup/provider labels and
# manages the needs-attention / waiting-for-user response state.
#
# SAFETY:
# * All issue content is treated as untrusted and is passed to the script via
#   `env:` only — never interpolated into a shell command.
# * Least-privilege token; downloads are host-allowlisted and byte-capped.
# * Defaults to DRY-RUN (set the repo variable TRIAGE_DRY_RUN=false to go live).
name: Issue triage

on:
  issues:
    types: [opened, edited, reopened]
  issue_comment:
    types: [created]
  # Manual re-triage of an existing issue (e.g. to backfill after a change).
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to (re)triage
        required: true

# One run at a time per issue; queue rather than cancel so state stays coherent.
concurrency:
  group: triage-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  analyze:
    # Opened/edited/reopened issues (never PRs), or a manual dispatch.
    if: >-
      ${{ (github.event_name == 'issues' && !github.event.issue.pull_request)
      || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    steps:
      - uses: actions/checkout@v4
      - name: Create triage App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.TRIAGE_APP_ID }}
          private-key: ${{ secrets.TRIAGE_APP_PRIVATE_KEY }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: .github/scripts
        run: pip install -r requirements.txt
      - name: Triage issue
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          TRIAGE_BOT_LOGIN: ${{ steps.app-token.outputs.app-slug }}[bot]
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          # Untrusted content — safe because it is an env var, not shell input.
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          TRIAGE_DRY_RUN: ${{ vars.TRIAGE_DRY_RUN }}
          TRIAGE_AI_ENABLED: ${{ vars.TRIAGE_AI_ENABLED }}
          TRIAGE_AI_MODEL: ${{ vars.TRIAGE_AI_MODEL }}
          TRIAGE_SCAN_LOGS: ${{ vars.TRIAGE_SCAN_LOGS }}
          # RAG layer (Phase 2) — only active when TRIAGE_AI_ENABLED is true.
          TRIAGE_RAG_ENABLED: ${{ vars.TRIAGE_RAG_ENABLED }}
          TRIAGE_EMBED_MODEL: ${{ vars.TRIAGE_EMBED_MODEL }}
          TRIAGE_EMBED_DIM: ${{ vars.TRIAGE_EMBED_DIM }}
          TRIAGE_ANSWER_MODEL: ${{ vars.TRIAGE_ANSWER_MODEL }}
          TRIAGE_ANSWER_HI: ${{ vars.TRIAGE_ANSWER_HI }}
          TRIAGE_ANSWER_LO: ${{ vars.TRIAGE_ANSWER_LO }}
          TRIAGE_DOCS_REPO: ${{ vars.TRIAGE_DOCS_REPO }}
          TRIAGE_SERVER_REF: ${{ vars.TRIAGE_SERVER_REF }}
          TRIAGE_INDEX_BRANCH: ${{ vars.TRIAGE_INDEX_BRANCH }}
          TRIAGE_RELATED_POSTS: ${{ vars.TRIAGE_RELATED_POSTS }}
          TRIAGE_RELATED_EXPAND_SCORE: ${{ vars.TRIAGE_RELATED_EXPAND_SCORE }}
          TRIAGE_PINNED_EXCLUDE_CATEGORIES: ${{ vars.TRIAGE_PINNED_EXCLUDE_CATEGORIES }}
          # Optional PAT for GitHub Models (used only when set); falls back to
          # the default token. Lets Models work when the org token can't.
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: python -m ma_triage triage

  respond:
    # New comments on issues (skip the bot's own comments and PR comments).
    if: >-
      ${{ github.event_name == 'issue_comment'
      && !github.event.issue.pull_request
      && github.event.comment.user.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Create triage App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.TRIAGE_APP_ID }}
          private-key: ${{ secrets.TRIAGE_APP_PRIVATE_KEY }}
          permission-issues: write
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: .github/scripts
        run: pip install -r requirements.txt
      - name: Update response state
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          TRIAGE_BOT_LOGIN: ${{ steps.app-token.outputs.app-slug }}[bot]
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_AUTHOR_LOGIN: ${{ github.event.comment.user.login }}
          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
          COMMENT_USER_TYPE: ${{ github.event.comment.user.type }}
          TRIAGE_DRY_RUN: ${{ vars.TRIAGE_DRY_RUN }}
        run: python -m ma_triage respond

  # Separate, least-privilege job: embed a newly-opened issue and append it to
  # the posts index on the `triage-index` branch. It has `contents: write` (to
  # commit the index) but deliberately NOT `issues: write` — so the job that can
  # write repo contents can never comment, and vice-versa. Only runs when the AI
  # layer is enabled (it makes one embedding call).
  index-append:
    if: >-
      ${{ github.event_name == 'issues'
      && github.event.action == 'opened'
      && !github.event.issue.pull_request
      && vars.TRIAGE_AI_ENABLED == 'true'
      && vars.TRIAGE_RAG_ENABLED != 'false' }}
    runs-on: ubuntu-latest
    # Serialise with the nightly index build (and other appends) so concurrent
    # force-pushes to the triage-index branch can't drop each other's writes.
    concurrency:
      group: rag-index-write
      cancel-in-progress: false
    permissions:
      contents: write # commit the posts index to the triage-index branch
      models: read # embeddings
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: .github/scripts
        run: pip install -r requirements.txt
      - name: Append issue to posts index
        working-directory: .github/scripts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          TRIAGE_DRY_RUN: ${{ vars.TRIAGE_DRY_RUN }}
          TRIAGE_AI_ENABLED: ${{ vars.TRIAGE_AI_ENABLED }}
          TRIAGE_RAG_ENABLED: ${{ vars.TRIAGE_RAG_ENABLED }}
          TRIAGE_EMBED_MODEL: ${{ vars.TRIAGE_EMBED_MODEL }}
          TRIAGE_EMBED_DIM: ${{ vars.TRIAGE_EMBED_DIM }}
          TRIAGE_INDEX_BRANCH: ${{ vars.TRIAGE_INDEX_BRANCH }}
          TRIAGE_INDEX_MAX_POSTS: ${{ vars.TRIAGE_INDEX_MAX_POSTS }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: python -m ma_triage index-append
